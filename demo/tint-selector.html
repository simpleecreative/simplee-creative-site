<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Window Tint Selector</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0A0A0A;
  min-height:100vh;
  font-family:"Rajdhani",sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1rem;
}
h1{
  font-family:"Bebas Neue",sans-serif;
  font-size:clamp(28px,4vw,52px);
  letter-spacing:6px;
  color:#fff;
  margin-bottom:.4rem;
  text-align:center;
  text-shadow:0 0 40px rgba(67,198,236,0.4);
}
.sub{
  font-family:"Rajdhani",sans-serif;
  font-size:clamp(12px,1.4vw,15px);
  letter-spacing:4px;
  text-transform:uppercase;
  color:#666;
  margin-bottom:2rem;
  text-align:center;
}
.btns{display:flex;gap:14px;margin-bottom:2rem;flex-wrap:wrap;justify-content:center}
.btn{
  position:relative;
  padding:14px 0;width:100px;
  border-radius:6px;
  border:1px solid #333;
  cursor:pointer;
  font-family:"Bebas Neue",sans-serif;
  font-size:22px;
  letter-spacing:2px;
  background:#111;
  color:#888;
  transition:color .25s,border-color .25s,box-shadow .25s,transform .15s;
  overflow:hidden;
}
.btn::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,0.08) 50%,transparent 60%);
  transform:translateX(-100%);
  transition:transform 0s;
}
.btn:hover::before{
  transform:translateX(200%);
  transition:transform .5s ease;
}
.btn:hover:not(.active){
  border-color:#43C6EC;
  color:#43C6EC;
  box-shadow:0 0 18px rgba(67,198,236,0.25), inset 0 0 12px rgba(67,198,236,0.06);
  transform:translateY(-2px);
}
.btn.active{
  background:#43C6EC;
  border-color:#43C6EC;
  color:#0A0A0A;
  box-shadow:0 0 28px rgba(67,198,236,0.55), 0 4px 20px rgba(67,198,236,0.3);
  transform:translateY(-2px);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 28px rgba(67,198,236,0.55),0 4px 20px rgba(67,198,236,0.3)}
  50%{box-shadow:0 0 42px rgba(67,198,236,0.8),0 4px 28px rgba(67,198,236,0.5)}
}
.btn:active{transform:translateY(0) scale(0.96)}
.car-wrap{width:100%;max-width:960px;position:relative}
.car-wrap img{width:100%;display:block;border-radius:6px}
.info{
  margin-top:1.1rem;
  font-family:"Rajdhani",sans-serif;
  font-size:clamp(13px,1.6vw,17px);
  font-weight:500;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#666;
  text-align:center;
  min-height:1.6em;
  transition:color .3s;
}
.car-wrap{position:relative}
.tint-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.wo-trail,.wo-head{fill:none;opacity:0}.wo-trail{stroke:#43C6EC;stroke-width:2}.wo-head{stroke:#7FDBF5;stroke-width:3.5}
.wo.flash{animation:outlineFlash 1.1s ease forwards}
@keyframes outlineFlash{
  0%{opacity:0;stroke-dashoffset:3000;stroke-dasharray:3000}
  15%{opacity:1}
  60%{opacity:1;stroke-dashoffset:0;stroke-dasharray:3000}
  85%{opacity:0.6;stroke-dashoffset:0}
  100%{opacity:0;stroke-dashoffset:0}
}body.embed{padding:1.2rem .75rem;min-height:0;justify-content:flex-start}body.embed h1{font-size:26px;letter-spacing:4px}body.embed .sub{font-size:11px;letter-spacing:3px;margin-bottom:1.3rem}</style>
</head>
<body>
